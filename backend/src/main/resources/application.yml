spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agendaflow}
    username: ${DB_USER:agendaflow}
    password: ${DB_PASSWORD:agendaflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
