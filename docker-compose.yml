services:
  database:
    image: postgres:16-alpine
    container_name: agendaflow-postgres
    environment:
      POSTGRES_DB: agendaflow
      POSTGRES_USER: agendaflow
      POSTGRES_PASSWORD: agendaflow
    ports:
      - "5432:5432"
    volumes:
      - agendaflow_postgres_data:/var/lib/postgresql/data

volumes:
  agendaflow_postgres_data:

